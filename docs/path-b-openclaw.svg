<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e84142"/>
    </marker>
    <filter id="shadow-b" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Path B: OpenClaw Integration</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Health AI as an MCP tool in the OpenClaw ecosystem</text>

  <!-- User -->
  <rect x="320" y="80" width="160" height="52" rx="26" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow-b)"/>
  <text x="400" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">User</text>
  <text x="400" y="119" text-anchor="middle" font-size="10" fill="#94a3b8">WhatsApp / Telegram / Discord / ...</text>

  <!-- Arrow down -->
  <line x1="400" y1="132" x2="400" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-b)"/>

  <!-- OpenClaw Gateway -->
  <rect x="250" y="170" width="300" height="56" rx="10" fill="#fef2f2" stroke="#e84142" stroke-width="1.5" filter="url(#shadow-b)"/>
  <text x="400" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">OpenClaw Gateway</text>
  <text x="400" y="212" text-anchor="middle" font-size="10" fill="#64748b">launchd service  |  port 18789</text>

  <!-- Arrow down -->
  <line x1="400" y1="226" x2="400" y2="262" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-b)"/>

  <!-- Agent -->
  <rect x="250" y="264" width="300" height="56" rx="10" fill="#fef2f2" stroke="#e84142" stroke-width="1.5" filter="url(#shadow-b)"/>
  <text x="400" y="289" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">OpenClaw Agent</text>
  <text x="400" y="306" text-anchor="middle" font-size="10" fill="#64748b">GPT-5.4  |  sees health_ask() in tool list</text>

  <!-- Arrow down - MCP call -->
  <line x1="400" y1="320" x2="400" y2="362" stroke="#e84142" stroke-width="2" marker-end="url(#arrow-red)" stroke-dasharray="6,3"/>
  <rect x="338" y="332" width="124" height="20" rx="10" fill="#fef2f2" stroke="#e84142" stroke-width="1"/>
  <text x="400" y="346" text-anchor="middle" font-size="9" font-weight="600" fill="#e84142">MCP tool call</text>

  <!-- MCP Server -->
  <rect x="240" y="364" width="320" height="56" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow-b)"/>
  <text x="400" y="388" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">healthpal-mcp</text>
  <text x="400" y="406" text-anchor="middle" font-size="10" fill="#64748b">MCP server (stdio)  |  Python  |  health_ask() + health_status()</text>

  <!-- Arrow down -->
  <line x1="400" y1="420" x2="400" y2="456" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-b)"/>
  <text x="412" y="444" font-size="9" fill="#94a3b8">HTTP localhost:8000</text>

  <!-- Flask API -->
  <rect x="270" y="458" width="260" height="48" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5" filter="url(#shadow-b)"/>
  <text x="400" y="479" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Flask /api/message</text>
  <text x="400" y="495" text-anchor="middle" font-size="9" fill="#a16207">same endpoint as standalone</text>

  <!-- Arrow down -->
  <line x1="400" y1="506" x2="400" y2="536" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-b)"/>

  <!-- Core engine -->
  <rect x="240" y="538" width="320" height="60" rx="12" fill="#0f172a" filter="url(#shadow-b)"/>
  <text x="400" y="564" text-anchor="middle" font-size="14" font-weight="700" fill="#f8fafc">HeartIntelligence Core</text>
  <text x="400" y="584" text-anchor="middle" font-size="10" fill="#94a3b8">EHR + Wearables + LLM + Guardrails + Images</text>

  <!-- Side annotations -->
  <!-- OpenClaw boundary -->
  <rect x="60" y="160" width="130" height="172" rx="8" fill="none" stroke="#e84142" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="125" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#e84142" opacity="0.6">OpenClaw</text>

  <!-- DREAM-Chat boundary -->
  <rect x="610" y="354" width="140" height="255" rx="8" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="680" y="374" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6" opacity="0.6">HeartIntelligence</text>

  <!-- Key benefits -->
  <text x="680" y="400" text-anchor="middle" font-size="9" fill="#64748b">No exec approval</text>
  <text x="680" y="416" text-anchor="middle" font-size="9" fill="#64748b">No JSON parsing</text>
  <text x="680" y="432" text-anchor="middle" font-size="9" fill="#64748b">Image in + out</text>
  <text x="680" y="448" text-anchor="middle" font-size="9" fill="#64748b">Verbatim response</text>

  <text x="125" y="200" text-anchor="middle" font-size="9" fill="#64748b">Owns channels</text>
  <text x="125" y="216" text-anchor="middle" font-size="9" fill="#64748b">Routes messages</text>
  <text x="125" y="232" text-anchor="middle" font-size="9" fill="#64748b">Agent personality</text>
</svg>
