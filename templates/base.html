<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>HeartIntelligence</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?t={{ cache_bust }}"/>
</head>
<body>

  <aside>
    <div class="logo-container">
      <div class="institution-logos">
        <img src="{{ url_for('static', filename='MGH.png') }}" alt="MGH Logo" class="institution-logo">
        <img src="{{ url_for('static', filename='HMS.png') }}" alt="HMS Logo" class="institution-logo">
        <img src="{{ url_for('static', filename='CAMCA.png') }}" alt="CAMCA Logo" class="institution-logo">
      </div>
      <div class="logo">HeartIntelligence</div>
    </div>
    <div class="nav-section">
      <div class="nav-item" id="newChatBtn">+  New Chat</div>
      <div class="nav-item" id="dashboardBtn">☰  Dashboard</div>
      <div class="nav-item" id="settingsBtn">⚙  Settings</div>
      <div class="nav-item" id="digitalTwinBtn">◑  My Body</div>
      <div class="nav-item" id="calendarBtn">📅  Calendar</div>
      <div class="nav-item" id="nutritionBtn">🥗  Nutrition</div>
      <div class="nav-item" id="pdfFormsBtn">📄  PDF Forms</div>
      <div class="nav-item" id="memoryBtn">🧠  Memory</div>
    </div>
    <div class="recents-title">Recents</div>
    <div class="recents" id="recentsList"></div>
    <div class="login-btn" id="loginBtn">
      {{ username if username else 'User' }}
    </div>
    <div class="logout-btn" id="logoutBtn">
      Logout
    </div>
  </aside>
  <main>
    {% block main %}{% endblock %}
  </main>
  {% block input %}{% endblock %}
  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}?t={{ cache_bust }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
