{% extends "base.html" %}
{% block main %}
  <div class="dashboard-page">
    <div class="dashboard-header">
      <h1>Health Dashboard</h1>
    </div>
    
    <!-- ECG Section -->
    <div class="ecg-section">
      <div class="ecg-image-container">
        <img src="{{ url_for('static', filename='ECG.jpg') }}" alt="ECG from Apple Watch" class="ecg-image">
        <img src="{{ url_for('static', filename='applewatch.gif') }}" alt="Apple Watch" class="ecg-image">
      </div>
      <p class="ecg-caption">ECG from Apple Watch</p>
    </div>
    
    <!-- Apple Health Data Sections -->
    <div class="dashboard-content apple-health-sections">
      <!-- Activity & Steps Section -->
      <div id="activitySection" class="apple-health-section">
        <div class="loading">Loading activity data...</div>
      </div>
      
      <!-- Heart Health Section -->
      <div id="heartHealthSection" class="apple-health-section">
        <div class="loading">Loading heart health data...</div>
      </div>
    </div>
    
    <div id="dashboardData" class="dashboard-content">
      <div class="loading">Loading health data...</div>
    </div>
  </div>
{% endblock %}

{% block input %}{% endblock %}

{% block scripts %}
  <!-- Dashboard-specific JavaScript -->
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
{% endblock %}
