<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register - HeartIntelligence</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">HeartIntelligence</h1>
    <p class="auth-subtitle">Create a new account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="auth-error">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
      <input class="auth-input" type="text" name="invite_code" placeholder="Invite code" required />
      <input class="auth-input" type="email" name="email" placeholder="Email address" required />
      <input class="auth-input" type="password" name="password" placeholder="Password (6+ characters)" required minlength="6" />
      <input class="auth-input" type="password" name="confirm_password" placeholder="Confirm password" required minlength="6" />
      <div class="tier-select">
        <label class="tier-option">
          <input type="radio" name="tier" value="base" checked />
          <span class="tier-card">
            <span class="tier-name">Base</span>
            <span class="tier-desc">Core health features</span>
          </span>
        </label>
        <label class="tier-option">
          <input type="radio" name="tier" value="premium" />
          <span class="tier-card">
            <span class="tier-name">Premium</span>
            <span class="tier-desc">Full access</span>
          </span>
        </label>
      </div>
      <button class="auth-button" type="submit">Create Account</button>
    </form>

    <p class="auth-link">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</body>
</html>
